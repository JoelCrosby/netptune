name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "client/**"
      - "website/**"
      - "charts/**"
      - ".github/workflows/deploy-charts.yml"

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  APP_IMAGE_NAME: ${{ github.repository_owner }}/netptune
  CLIENT_IMAGE_NAME: ${{ github.repository_owner }}/netptune-client
  JOBS_IMAGE_NAME: ${{ github.repository_owner }}/netptune-jobs
  WEBSITE_IMAGE_NAME: ${{ github.repository_owner }}/netptune-website

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
      website: ${{ steps.filter.outputs.website }}
      charts: ${{ steps.filter.outputs.charts }}
      deploy: ${{ steps.filter.outputs.deploy }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        run: |
          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [[ "$before" =~ ^0+$ ]] || ! git cat-file -e "$before^{commit}" 2>/dev/null; then
            before="$(git rev-list --max-parents=0 "$after")"
          fi

          server=false
          client=false
          website=false
          charts=false

          while IFS= read -r path; do
            case "$path" in
              server/*) server=true ;;
              client/*) client=true ;;
              website/*) website=true ;;
              charts/*) charts=true ;;
            esac
          done < <(git diff --name-only "$before" "$after")

          deploy=false
          if [[ "$server" == true || "$client" == true || "$website" == true || "$charts" == true ]]; then
            deploy=true
          fi

          {
            echo "server=$server"
            echo "client=$client"
            echo "website=$website"
            echo "charts=$charts"
            echo "deploy=$deploy"
          } >> "$GITHUB_OUTPUT"

  test-server:
    name: Test Server
    needs: changes
    if: ${{ needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Restore unit tests
        run: dotnet restore Netptune.UnitTests/Netptune.UnitTests.csproj

      - name: Build unit tests
        run: dotnet build Netptune.UnitTests/Netptune.UnitTests.csproj --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test --project Netptune.UnitTests/Netptune.UnitTests.csproj --no-build --configuration Release

      - name: Restore integration tests
        run: dotnet restore Netptune.IntegrationTests/Netptune.IntegrationTests.csproj

      - name: Build integration tests
        run: dotnet build Netptune.IntegrationTests/Netptune.IntegrationTests.csproj --no-restore --configuration Release

      - name: Run integration tests
        run: dotnet test --project Netptune.IntegrationTests/Netptune.IntegrationTests.csproj --no-build --configuration Release

  build-app:
    name: Build App Image
    needs: [changes, test-server]
    if: ${{ always() && needs.changes.outputs.server == 'true' && needs.test-server.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build number
        id: build_number
        run: echo "value=$(date '+%Y%m%d').${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.APP_IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Netptune.App/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT=${{ github.sha }}
            GITHUB_REF=${{ github.ref }}
            BUILD_NUMBER=${{ steps.build_number.outputs.value }}
            RUN_ID=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-jobs:
    name: Build Jobs Image
    needs: [changes, test-server]
    if: ${{ always() && needs.changes.outputs.server == 'true' && needs.test-server.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build number
        id: build_number
        run: echo "value=$(date '+%Y%m%d').${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.JOBS_IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Netptune.JobServer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT=${{ github.sha }}
            GITHUB_REF=${{ github.ref }}
            BUILD_NUMBER=${{ steps.build_number.outputs.value }}
            RUN_ID=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-client:
    name: Build Client Image
    needs: changes
    if: ${{ needs.changes.outputs.client == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build number
        id: build_number
        run: echo "value=$(date '+%Y%m%d').${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.CLIENT_IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./client
          file: client/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT=${{ github.sha }}
            GITHUB_REF=${{ github.ref }}
            BUILD_NUMBER=${{ steps.build_number.outputs.value }}
            RUN_ID=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-website:
    name: Build Website Image
    needs: changes
    if: ${{ needs.changes.outputs.website == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build number
        id: build_number
        run: echo "value=$(date '+%Y%m%d').${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.WEBSITE_IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./website
          file: website/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT=${{ github.sha }}
            BUILD_NUMBER=${{ steps.build_number.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: [changes, test-server, build-app, build-jobs, build-client, build-website]
    if: |
      ${{
        always() &&
        needs.changes.outputs.deploy == 'true' &&
        (needs.test-server.result == 'success' || needs.test-server.result == 'skipped') &&
        (needs.build-app.result == 'success' || needs.build-app.result == 'skipped') &&
        (needs.build-jobs.result == 'success' || needs.build-jobs.result == 'skipped') &&
        (needs.build-client.result == 'success' || needs.build-client.result == 'skipped') &&
        (needs.build-website.result == 'success' || needs.build-website.result == 'skipped')
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5

      - name: Write kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_PROD }}" > kubeconfig.yaml

      - name: Deploy
        run: |
          helm upgrade --install netptune-app charts/netptune/ \
            --atomic \
            --wait \
            --timeout 10m \
            --kubeconfig kubeconfig.yaml \
            --namespace default \
            --set ingress.enabled=true \
            --set "ingress.host=netptune.co.uk" \
            --set ingress.tls.enabled=true \
            --set "ingress.tls.email=${{ secrets.TLS_EMAIL }}" \
            --set "parameters.client.api_url=http://api-service:7400" \
            --set "secrets.postgres.postgres_password=${{ secrets.POSTGRES_PASSWORD }}" \
            --set "secrets.meilisearch.master_key=${{ secrets.NETPTUNE_MEILISEARCH_MASTER_KEY }}" \
            --set "secrets.cache.cache_password=${{ secrets.CACHE_PASSWORD }}" \
            --set "secrets.api.cache_password=${{ secrets.CACHE_PASSWORD }}" \
            --set "secrets.api.postgres_password=${{ secrets.POSTGRES_PASSWORD }}" \
            --set "secrets.api.signing_key=${{ secrets.SIGNING_KEY }}" \
            --set "secrets.api.github_client_id=${{ secrets.NETPTUNE_GITHUB_CLIENT_ID }}" \
            --set "secrets.api.github_secret=${{ secrets.NETPTUNE_GITHUB_SECRET }}" \
            --set "secrets.api.github_callback=${{ secrets.NETPTUNE_GITHUB_CALLBACK }}" \
            --set "secrets.api.google_client_id=${{ secrets.NETPTUNE_GOOGLE_CLIENT_ID }}" \
            --set "secrets.api.google_secret=${{ secrets.NETPTUNE_GOOGLE_SECRET }}" \
            --set "secrets.api.google_callback=${{ secrets.NETPTUNE_GOOGLE_CALLBACK }}" \
            --set "secrets.api.microsoft_client_id=${{ secrets.NETPTUNE_MICROSOFT_CLIENT_ID }}" \
            --set "secrets.api.microsoft_secret=${{ secrets.NETPTUNE_MICROSOFT_SECRET }}" \
            --set "secrets.api.microsoft_callback=${{ secrets.NETPTUNE_MICROSOFT_CALLBACK }}" \
            --set "secrets.api.sendgrid_api_key=${{ secrets.SENDGRID_API_KEY }}" \
            --set "secrets.api.s3_bucket_name=${{ secrets.S3_BUCKET_NAME }}" \
            --set "secrets.api.s3_region=${{ secrets.S3_REGION }}" \
            --set "secrets.api.s3_access_key_id=${{ secrets.S3_ACCESS_KEY_ID }}" \
            --set "secrets.api.s3_secret_access_key=${{ secrets.S3_SECRET_ACCESS_KEY }}" \
            --set "secrets.api.turnstile_secret_key=${{ secrets.NETPTUNE_TURNSTILE_SECRET_KEY }}" \
            --set "secrets.api.cloudflare_email_token=${{ secrets.NETPTUNE_CLOUDFLARE_EMAIL_TOKEN }}" \
            --set "secrets.api.cloudflare_account_id=${{ secrets.NETPTUNE_CLOUDFLARE_ACCOUNT_ID }}" \
            --set "secrets.jobs.cache_password=${{ secrets.CACHE_PASSWORD }}" \
            --set "secrets.jobs.postgres_password=${{ secrets.POSTGRES_PASSWORD }}" \
            --set "secrets.jobs.signing_key=${{ secrets.SIGNING_KEY }}" \
            --set "secrets.jobs.sendgrid_api_key=${{ secrets.SENDGRID_API_KEY }}" \
            --set "secrets.jobs.s3_bucket_name=${{ secrets.S3_BUCKET_NAME }}" \
            --set "secrets.jobs.s3_region=${{ secrets.S3_REGION }}" \
            --set "secrets.jobs.s3_access_key_id=${{ secrets.S3_ACCESS_KEY_ID }}" \
            --set "secrets.jobs.s3_secret_access_key=${{ secrets.S3_SECRET_ACCESS_KEY }}" \
            --set "secrets.jobs.cloudflare_email_token=${{ secrets.NETPTUNE_CLOUDFLARE_EMAIL_TOKEN }}" \
            --set "secrets.jobs.cloudflare_account_id=${{ secrets.NETPTUNE_CLOUDFLARE_ACCOUNT_ID }}" \
            --set "secrets.headlamp.github_client_id=${{ secrets.HEADLAMP_GITHUB_CLIENT_ID }}" \
            --set "secrets.headlamp.github_client_secret=${{ secrets.HEADLAMP_GITHUB_CLIENT_SECRET }}" \
            --set "secrets.headlamp.cookie_secret=${{ secrets.HEADLAMP_COOKIE_SECRET }}" \
            --set "secrets.grafana.admin_password=${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
            --set "secrets.dbgate.github_client_id=${{ secrets.DBGATE_GITHUB_CLIENT_ID }}" \
            --set "secrets.dbgate.github_client_secret=${{ secrets.DBGATE_GITHUB_CLIENT_SECRET }}" \
            --set "secrets.dbgate.cookie_secret=${{ secrets.DBGATE_COOKIE_SECRET }}"

      - name: Restart deployments
        env:
          SERVER_CHANGED: ${{ needs.changes.outputs.server }}
          CLIENT_CHANGED: ${{ needs.changes.outputs.client }}
          WEBSITE_CHANGED: ${{ needs.changes.outputs.website }}
          CHARTS_CHANGED: ${{ needs.changes.outputs.charts }}
        run: |
          deployments=()

          if [[ "$SERVER_CHANGED" == "true" || "$CHARTS_CHANGED" == "true" ]]; then
            deployments+=(api-deployment jobs-deployment)
          fi

          if [[ "$CLIENT_CHANGED" == "true" || "$CHARTS_CHANGED" == "true" ]]; then
            deployments+=(client-deployment)
          fi

          if [[ "$WEBSITE_CHANGED" == "true" || "$CHARTS_CHANGED" == "true" ]]; then
            deployments+=(website-deployment)
          fi

          if [[ "${#deployments[@]}" -eq 0 ]]; then
            echo "No application deployments need a restart."
            exit 0
          fi

          for deployment in "${deployments[@]}"; do
            kubectl --kubeconfig kubeconfig.yaml --namespace default rollout restart "deployment/$deployment"
          done

          for deployment in "${deployments[@]}"; do
            kubectl --kubeconfig kubeconfig.yaml --namespace default rollout status "deployment/$deployment" --timeout 5m
          done
