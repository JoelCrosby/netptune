---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "client-deployment"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "client"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "netptune-app"
        app.kubernetes.io/component: "client"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: "kubernetes.io/hostname"
          whenUnsatisfiable: "ScheduleAnyway"
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: "netptune-app"
              app.kubernetes.io/component: "client"
              app.kubernetes.io/instance: "{{ .Release.Name }}"
      containers:
        - image: "{{ .Values.parameters.client.client_image }}"
          name: "client"
          envFrom:
            - configMapRef:
                name: "client-config"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: 80
          imagePullPolicy: "Always"
          readinessProbe:
            httpGet:
              path: "/"
              port: "http"
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: "netptune-app"
      app.kubernetes.io/component: "client"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: {{ .Values.parameters.client.replicas | int }}
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: "RollingUpdate"
