{{- if .Values.parameters.client.autoscaling.enabled }}
---
apiVersion: "autoscaling/v2"
kind: "HorizontalPodAutoscaler"
metadata:
  name: "client-hpa"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "client"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  scaleTargetRef:
    apiVersion: "apps/v1"
    kind: "Deployment"
    name: "client-deployment"
  minReplicas: {{ .Values.parameters.client.autoscaling.minReplicas | int }}
  maxReplicas: {{ .Values.parameters.client.autoscaling.maxReplicas | int }}
  metrics:
    - type: "Resource"
      resource:
        name: "cpu"
        target:
          type: "Utilization"
          averageUtilization: {{ .Values.parameters.client.autoscaling.targetCPUUtilizationPercentage | int }}
{{- end }}
