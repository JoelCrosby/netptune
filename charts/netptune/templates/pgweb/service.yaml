{{- if .Values.pgweb.enabled }}
---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "pgweb-service"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "pgweb"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  type: "ClusterIP"
  selector:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "pgweb"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: "http"
      protocol: "TCP"
      port: 8081
      targetPort: 8081
{{- end }}
