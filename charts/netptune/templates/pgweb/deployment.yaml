{{- if .Values.pgweb.enabled }}
---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "pgweb-deployment"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "pgweb"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "netptune-app"
      app.kubernetes.io/component: "pgweb"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "netptune-app"
        app.kubernetes.io/component: "pgweb"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - name: "pgweb"
          image: "{{ .Values.pgweb.image }}"
          imagePullPolicy: "IfNotPresent"
          ports:
            - name: "http"
              containerPort: 8081
              protocol: "TCP"
          envFrom:
            - secretRef:
                name: "pgweb-secrets"
{{- end }}
