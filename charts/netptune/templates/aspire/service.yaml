{{- if .Values.aspire.enabled }}
---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "aspire-dashboard-service"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "aspire-dashboard"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  type: "ClusterIP"
  selector:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "aspire-dashboard"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: "http"
      protocol: "TCP"
      port: 18888
      targetPort: 18888
    - name: "otlp-grpc"
      protocol: "TCP"
      port: 18889
      targetPort: 18889
    - name: "otlp-http"
      protocol: "TCP"
      port: 18890
      targetPort: 18890
{{- end }}
