{{- if .Values.aspire.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: aspire
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "aspire-dashboard"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  parentRefs:
    - name: netptune-gateway
      sectionName: https-aspire
  hostnames:
    - "{{ .Values.aspire.host }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: aspire-oauth2-proxy-service
          port: 4180
{{- end }}
