{{- if .Values.prometheus.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "prometheus"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  parentRefs:
    - name: netptune-gateway
      sectionName: https-prometheus
  hostnames:
    - "{{ .Values.prometheus.host }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: oauth2-forwardauth
      backendRefs:
        - name: prometheus-service
          port: 9090
{{- end }}
