{{- if .Values.prometheus.enabled }}
---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "prometheus-service"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "prometheus"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  type: "ClusterIP"
  selector:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "prometheus"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: "http"
      protocol: "TCP"
      port: 9090
      targetPort: 9090
{{- end }}
