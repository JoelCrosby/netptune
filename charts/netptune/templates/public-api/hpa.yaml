{{- if .Values.parameters.publicApi.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: public-api-hpa
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "public-api"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: public-api-deployment
  minReplicas: {{ .Values.parameters.publicApi.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.parameters.publicApi.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.parameters.publicApi.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
