---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  headers:
    customResponseHeaders:
      Strict-Transport-Security: "max-age=31536000; includeSubDomains"
      Permissions-Policy: "camera=(), microphone=(), geolocation=()"
      Content-Security-Policy-Report-Only: "default-src 'self'; script-src 'self' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://{{ .Values.ingress.appHost }}; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; frame-src https://challenges.cloudflare.com; frame-ancestors 'none';"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: body-size-limit
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  buffering:
    maxRequestBodyBytes: 52428800
