{{- if .Values.loki.enabled }}
---
apiVersion: "v1"
kind: "PersistentVolumeClaim"
metadata:
  name: "loki-pvc"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "loki"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  accessModes:
    - "ReadWriteOnce"
  resources:
    requests:
      storage: "{{ .Values.persistence.loki.size }}"
{{- end }}
