{{- if .Values.loki.enabled }}
---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "loki-service"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "loki"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  type: "ClusterIP"
  selector:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "loki"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: "http"
      protocol: "TCP"
      port: 3100
      targetPort: 3100
{{- end }}
