---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "api-deployment"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "api"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "netptune-app"
        app.kubernetes.io/component: "api"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: "kubernetes.io/hostname"
          whenUnsatisfiable: "ScheduleAnyway"
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: "netptune-app"
              app.kubernetes.io/component: "api"
              app.kubernetes.io/instance: "{{ .Release.Name }}"
      containers:
        - image: "{{ .Values.parameters.api.api_image }}"
          name: "api"
          env:
            - name: "ASPNETCORE_ENVIRONMENT"
              value: "Production"
          envFrom:
            - configMapRef:
                name: "api-config"
            - secretRef:
                name: "api-secrets"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: {{ .Values.parameters.api.port_http | int }}
          imagePullPolicy: "Always"
          livenessProbe:
            httpGet:
              path: "/health/live"
              port: "http"
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: "/health/ready"
              port: "http"
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: "netptune-app"
      app.kubernetes.io/component: "api"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: {{ .Values.parameters.api.replicas | int }}
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: "RollingUpdate"
