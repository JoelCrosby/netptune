---
apiVersion: "batch/v1"
kind: "Job"
metadata:
  name: "kafka-init"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "kafka"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  annotations:
    "helm.sh/hook": "post-install,post-upgrade"
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": "before-hook-creation"
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "netptune-app"
        app.kubernetes.io/component: "kafka-init"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      restartPolicy: "OnFailure"
      initContainers:
        - name: "wait-for-kafka"
          image: "docker.io/confluentinc/confluent-local:8.1.1"
          imagePullPolicy: "IfNotPresent"
          command:
            - "/bin/sh"
            - "-c"
            - |
              until kafka-topics --bootstrap-server kafka-service:9092 --list > /dev/null 2>&1; do
                echo "Waiting for Kafka...";
                sleep 5;
              done
      containers:
        - name: "kafka-init"
          image: "docker.io/confluentinc/confluent-local:8.1.1"
          imagePullPolicy: "IfNotPresent"
          command:
            - "/bin/sh"
            - "-c"
            - |
              kafka-topics --bootstrap-server kafka-service:9092 \
                --create --if-not-exists \
                --topic netptune \
                --partitions 1 \
                --replication-factor 1
              echo "Kafka topic 'netptune' ready."
