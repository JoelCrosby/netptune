{{- if .Values.website.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: website
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "website"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  parentRefs:
    - name: netptune-gateway
      sectionName: https-website
  hostnames:
    - "{{ .Values.website.host }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      timeouts:
        request: 3600s
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: body-size-limit
      backendRefs:
        - name: website-service
          port: 80
{{- end }}
