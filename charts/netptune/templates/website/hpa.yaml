{{- if and .Values.website.enabled .Values.website.autoscaling.enabled }}
---
apiVersion: "autoscaling/v2"
kind: "HorizontalPodAutoscaler"
metadata:
  name: "website-hpa"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "website"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  scaleTargetRef:
    apiVersion: "apps/v1"
    kind: "Deployment"
    name: "website-deployment"
  minReplicas: {{ .Values.website.autoscaling.minReplicas | int }}
  maxReplicas: {{ .Values.website.autoscaling.maxReplicas | int }}
  metrics:
    - type: "Resource"
      resource:
        name: "cpu"
        target:
          type: "Utilization"
          averageUtilization: {{ .Values.website.autoscaling.targetCPUUtilizationPercentage | int }}
{{- end }}
