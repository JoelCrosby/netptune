---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "website-deployment"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "website"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "netptune-app"
        app.kubernetes.io/component: "website"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: "kubernetes.io/hostname"
          whenUnsatisfiable: "ScheduleAnyway"
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: "netptune-app"
              app.kubernetes.io/component: "website"
              app.kubernetes.io/instance: "{{ .Release.Name }}"
      containers:
        - image: "{{ .Values.website.image }}"
          name: "website"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: 80
          imagePullPolicy: "Always"
  selector:
    matchLabels:
      app.kubernetes.io/name: "netptune-app"
      app.kubernetes.io/component: "website"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: {{ .Values.website.replicas | int }}
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
