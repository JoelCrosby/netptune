{{- if .Values.ingress.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: netptune-root
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  parentRefs:
    - name: netptune-gateway
      sectionName: https-netptune
  hostnames:
    - "{{ .Values.ingress.host }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/"
      timeouts:
        request: 3600s
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: security-headers
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: body-size-limit
      backendRefs:
        - name: api-service
          port: {{ .Values.parameters.api.port_http | int }}
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: security-headers
      backendRefs:
        - name: website-service
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: netptune-app
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  parentRefs:
    - name: netptune-gateway
      sectionName: https-app
  hostnames:
    - "{{ .Values.ingress.appHost }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/"
      timeouts:
        request: 3600s
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: security-headers
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: body-size-limit
      backendRefs:
        - name: api-service
          port: {{ .Values.parameters.api.port_http | int }}
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: security-headers
      backendRefs:
        - name: client-service
          port: 80
{{- end }}
