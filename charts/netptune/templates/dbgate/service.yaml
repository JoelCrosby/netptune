{{- if .Values.dbgate.enabled }}
---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "dbgate-service"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "dbgate"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  type: "ClusterIP"
  selector:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "dbgate"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: "http"
      protocol: "TCP"
      port: 3000
      targetPort: 3000
{{- end }}
