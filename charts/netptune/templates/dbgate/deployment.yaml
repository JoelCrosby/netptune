{{- if .Values.dbgate.enabled }}
---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "dbgate-deployment"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "dbgate"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "netptune-app"
      app.kubernetes.io/component: "dbgate"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "netptune-app"
        app.kubernetes.io/component: "dbgate"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - name: "dbgate"
          image: "{{ .Values.dbgate.image }}"
          imagePullPolicy: "IfNotPresent"
          ports:
            - name: "http"
              containerPort: 3000
              protocol: "TCP"
          envFrom:
            - secretRef:
                name: "dbgate-secrets"
{{- end }}
