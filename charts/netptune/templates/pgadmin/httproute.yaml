{{- if .Values.pgadmin.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pgadmin
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "pgadmin"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  parentRefs:
    - name: netptune-gateway
      sectionName: https-pgadmin
  hostnames:
    - "{{ .Values.pgadmin.host }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: pgadmin-oauth2-proxy-service
          port: 4180
{{- end }}
