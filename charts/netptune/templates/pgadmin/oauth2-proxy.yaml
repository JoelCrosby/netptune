{{- if .Values.pgadmin.enabled }}
---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "pgadmin-oauth2-proxy"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "pgadmin-oauth2-proxy"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "netptune-app"
      app.kubernetes.io/component: "pgadmin-oauth2-proxy"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "netptune-app"
        app.kubernetes.io/component: "pgadmin-oauth2-proxy"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - name: "oauth2-proxy"
          image: "quay.io/oauth2-proxy/oauth2-proxy:latest"
          imagePullPolicy: "IfNotPresent"
          args:
            - "--provider=github"
            - "--upstream=http://pgadmin-service:80"
            - "--http-address=0.0.0.0:4180"
            - "--email-domain={{ .Values.headlamp.oauth2.allowed_email_domain }}"
            - "--cookie-secure=true"
            - "--cookie-domain=.{{ .Values.ingress.host }}"
            - "--redirect-url=https://{{ .Values.pgadmin.host }}/oauth2/callback"
            - "--whitelist-domain=.{{ .Values.ingress.host }}"
            - "--skip-provider-button=true"
            - "--scope=user:email read:org"
          envFrom:
            - secretRef:
                name: "pgadmin-oauth2-proxy-secrets"
          ports:
            - name: "http"
              containerPort: 4180
              protocol: "TCP"
---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "pgadmin-oauth2-proxy-service"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "pgadmin-oauth2-proxy"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  type: "ClusterIP"
  selector:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "pgadmin-oauth2-proxy"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: "http"
      protocol: "TCP"
      port: 4180
      targetPort: 4180
{{- end }}
