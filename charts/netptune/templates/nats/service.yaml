---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "nats-service"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "nats"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  type: "ClusterIP"
  selector:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "nats"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: "client"
      protocol: "TCP"
      port: 4222
      targetPort: 4222
    # The monitoring endpoint (nats-server -m 8222). The KEDA nats-jetstream scaler reads consumer lag
    # from it, and it is the only place JetStream stream and consumer state is observable from.
    - name: "monitor"
      protocol: "TCP"
      port: 8222
      targetPort: "monitor"
