---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "nats-service"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "nats"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  type: "ClusterIP"
  selector:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "nats"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: "client"
      protocol: "TCP"
      port: 4222
      targetPort: 4222
    - name: "monitoring"
      protocol: "TCP"
      port: 8222
      targetPort: 8222
