---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "nats-deployment"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "nats"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: "netptune-app"
      app.kubernetes.io/component: "nats"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "netptune-app"
        app.kubernetes.io/component: "nats"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - name: "nats"
          image: "nats:alpine"
          args:
            - "-js"
            - "-m"
            - "8222"
          ports:
            - name: "client"
              protocol: "TCP"
              containerPort: 4222
            - name: "monitoring"
              protocol: "TCP"
              containerPort: 8222
          imagePullPolicy: "IfNotPresent"
