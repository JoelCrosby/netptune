---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "activity-service"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "activity"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  type: "ClusterIP"
  selector:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "activity"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: "http"
      protocol: "TCP"
      port: {{ .Values.parameters.activity.port_http | int }}
      targetPort: {{ .Values.parameters.activity.port_http | int }}
