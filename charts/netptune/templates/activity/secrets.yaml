---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "activity-secrets"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "activity"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
stringData:
  ConnectionStrings__cache: "cache-service:6379,password={{ .Values.secrets.activity.cache_password }}"
  CACHE_PASSWORD: "{{ .Values.secrets.activity.cache_password }}"
  CACHE_URI: "valkey://:{{ .Values.secrets.activity.cache_password }}@cache-service:6379"
  REDIS_URL: "cache-service:6379,password={{ .Values.secrets.activity.cache_password }}"
  ConnectionStrings__postgresdb: "Host=postgres-service;Port=5432;Username=postgres;Password={{ .Values.secrets.activity.postgres_password }};Database=netptune"
  POSTGRESDB_PASSWORD: "{{ .Values.secrets.activity.postgres_password }}"
  POSTGRESDB_URI: "postgresql://postgres:{{ .Values.secrets.activity.postgres_password }}@postgres-service:5432/netptune"
  ConnectionStrings__netptune: "Host=postgres-service;Port=5432;Username=postgres;Password={{ .Values.secrets.activity.postgres_password }};Database=netptune"
  NETPTUNE_SIGNING_KEY: "{{ .Values.secrets.activity.signing_key }}"
  NETPTUNE_S3_BUCKET_NAME: "{{ .Values.secrets.activity.s3_bucket_name }}"
  NETPTUNE_S3_REGION: "{{ .Values.secrets.activity.s3_region }}"
  NETPTUNE_S3_ACCESS_KEY_ID: "{{ .Values.secrets.activity.s3_access_key_id }}"
  NETPTUNE_S3_SECRET_ACCESS_KEY: "{{ .Values.secrets.activity.s3_secret_access_key }}"
{{- if .Values.aspire.enabled }}
  OTEL_EXPORTER_OTLP_HEADERS: "x-otlp-api-key={{ .Values.secrets.aspire.otlp_api_key }}"
{{- end }}
type: "Opaque"
