{{- if .Values.grafana.enabled }}
---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "grafana-secrets"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "grafana"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
type: "Opaque"
stringData:
  admin_password: "{{ .Values.secrets.grafana.admin_password }}"
{{- end }}
