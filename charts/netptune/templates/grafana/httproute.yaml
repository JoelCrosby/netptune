{{- if .Values.grafana.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "grafana"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  parentRefs:
    - name: netptune-gateway
      sectionName: https-grafana
  hostnames:
    - "{{ .Values.grafana.host }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: oauth2-forwardauth
      backendRefs:
        - name: grafana-service
          port: 3000
{{- end }}
