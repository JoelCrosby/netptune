{{- if .Values.ingress.enabled }}
---
apiVersion: "networking.k8s.io/v1"
kind: "Ingress"
metadata:
  name: "netptune-ingress"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
      add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://app.netptune.co.uk; img-src 'self' data: https:; frame-ancestors 'none';" always;
    {{- if .Values.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    {{- end }}
spec:
  ingressClassName: "nginx"
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - "{{ .Values.ingress.host }}"
      secretName: "netptune-tls"
    - hosts:
        - "{{ .Values.ingress.appHost }}"
      secretName: "netptune-app-tls"
  {{- end }}
  rules:
    - host: "{{ .Values.ingress.host }}"
      http:
        paths:
          - path: "/api/"
            pathType: "Prefix"
            backend:
              service:
                name: "api-service"
                port:
                  number: {{ .Values.parameters.api.port_http | int }}
          - path: "/"
            pathType: "Prefix"
            backend:
              service:
                name: "website-service"
                port:
                  number: 80
    - host: "{{ .Values.ingress.appHost }}"
      http:
        paths:
          - path: "/api/"
            pathType: "Prefix"
            backend:
              service:
                name: "api-service"
                port:
                  number: {{ .Values.parameters.api.port_http | int }}
          - path: "/"
            pathType: "Prefix"
            backend:
              service:
                name: "client-service"
                port:
                  number: 80
{{- end }}
