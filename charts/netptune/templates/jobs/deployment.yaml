---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "jobs-deployment"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "jobs"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "netptune-app"
        app.kubernetes.io/component: "jobs"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "{{ .Values.parameters.jobs.jobs_image }}"
          name: "jobs"
          env:
            - name: "ASPNETCORE_ENVIRONMENT"
              value: "Production"
          envFrom:
            - configMapRef:
                name: "jobs-config"
            - secretRef:
                name: "jobs-secrets"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: {{ .Values.parameters.jobs.port_http | int }}
          imagePullPolicy: "Always"
          livenessProbe:
            httpGet:
              path: "/health/live"
              port: "http"
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: "/health/ready"
              port: "http"
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: "netptune-app"
      app.kubernetes.io/component: "jobs"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: "RollingUpdate"
