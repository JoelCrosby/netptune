{{- if .Values.headlamp.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "headlamp"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  parentRefs:
    - name: netptune-gateway
      sectionName: https-headlamp
  hostnames:
    - "{{ .Values.headlamp.host }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: oauth2-proxy-service
          port: 4180
{{- end }}
