{{- if .Values.headlamp.enabled }}
---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "headlamp-deployment"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "headlamp"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: "netptune-app"
      app.kubernetes.io/component: "headlamp"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "netptune-app"
        app.kubernetes.io/component: "headlamp"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      serviceAccountName: "headlamp"
      containers:
        - name: "headlamp"
          image: "{{ .Values.headlamp.image }}"
          args:
            - "-kubeconfig"
            - "/etc/headlamp/config/kubeconfig"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: 4466
          imagePullPolicy: "IfNotPresent"
          volumeMounts:
            - name: "kubeconfig"
              mountPath: "/etc/headlamp/config"
              readOnly: true
      volumes:
        - name: "kubeconfig"
          configMap:
            name: "headlamp-kubeconfig"
{{- end }}
