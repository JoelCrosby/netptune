---
apiVersion: "apps/v1"
kind: "StatefulSet"
metadata:
  name: "postgres-statefulset"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "postgres"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  serviceName: "postgres-service"
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "netptune-app"
      app.kubernetes.io/component: "postgres"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "netptune-app"
        app.kubernetes.io/component: "postgres"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "docker.io/library/postgres:17.6"
          name: "postgres"
          envFrom:
            - configMapRef:
                name: "postgres-config"
            - secretRef:
                name: "postgres-secrets"
          ports:
            - name: "tcp"
              protocol: "TCP"
              containerPort: 5432
          volumeMounts:
            - name: "postgres-data"
              mountPath: "/var/lib/postgresql/data"
          imagePullPolicy: "IfNotPresent"
  updateStrategy:
    type: "RollingUpdate"
    rollingUpdate:
      maxUnavailable: 1
  volumeClaimTemplates:
    - metadata:
        name: "postgres-data"
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: "{{ .Values.persistence.postgres.size }}"
