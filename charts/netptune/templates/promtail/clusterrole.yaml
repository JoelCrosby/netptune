{{- if .Values.loki.enabled }}
---
apiVersion: "rbac.authorization.k8s.io/v1"
kind: "ClusterRole"
metadata:
  name: "promtail"
  labels:
    app.kubernetes.io/name: "netptune-app"
    app.kubernetes.io/component: "promtail"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
rules:
  - apiGroups: [""]
    resources:
      - "nodes"
      - "nodes/proxy"
      - "services"
      - "endpoints"
      - "pods"
    verbs: ["get", "list", "watch"]
{{- end }}
