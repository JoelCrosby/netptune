  headlamp:
    github_client_id: ""
    github_client_secret: ""
    cookie_secret: ""
  dbgate:
    github_client_id: ""
    github_client_secret: ""
    cookie_secret: ""
  aspire:
    github_client_id: ""
    github_client_secret: ""
    cookie_secret: ""
    otlp_api_key: ""
  postgres:
    postgres_password: ""
  meilisearch:
    master_key: ""
  cache:
    cache_password: ""
  jobs:
    cache_password: ""
    postgres_password: ""
    signing_key: ""
    sendgrid_api_key: ""
    s3_bucket_name: ""
    s3_region: ""
    s3_access_key_id: ""
    s3_secret_access_key: ""
    cloudflare_email_token: ""
    cloudflare_account_id: ""
  activity:
    cache_password: ""
    postgres_password: ""
    signing_key: ""
    s3_bucket_name: ""
    s3_region: ""
    s3_access_key_id: ""
    s3_secret_access_key: ""
  api:
    cache_password: ""
    postgres_password: ""
    signing_key: ""
    github_client_id: ""
    github_secret: ""
    github_callback: ""
    google_client_id: ""
    google_secret: ""
    google_callback: ""
    microsoft_client_id: ""
    microsoft_secret: ""
