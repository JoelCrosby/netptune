ingress:
  enabled: true
  host: "netptune.co.uk"
  appHost: "app.netptune.co.uk"
  tls:
    enabled: true
    email: ""

persistence:
  postgres:
    size: "40Gi"
  monitoring:
    size: "40Gi"

headlamp:
  enabled: true
  image: "ghcr.io/headlamp-k8s/headlamp:latest"
  host: "headlamp.netptune.co.uk"
  oauth2:
    allowed_email_domain: "live.co.uk"

pgadmin:
  enabled: true
  image: "dpage/pgadmin4:latest"
  host: "pgadmin.netptune.co.uk"

otelCollector:
  enabled: true
  image: "otel/opentelemetry-collector-contrib:latest"

prometheus:
  enabled: true
  image: "prom/prometheus:latest"
  retention: "15d"
  host: "prometheus.netptune.co.uk"

grafana:
  enabled: true
  image: "grafana/grafana:latest"
  host: "grafana.netptune.co.uk"

loki:
  enabled: true
  image: "grafana/loki:latest"
  promtailImage: "grafana/promtail:latest"
website:
  enabled: true
  image: "ghcr.io/joelcrosby/netptune-website:latest"
  host: "www.netptune.co.uk"

parameters:
  jobs:
    port_http: 8080
    jobs_image: "ghcr.io/joelcrosby/netptune-jobs:latest"
  api:
    port_http: 7400
    api_image: "ghcr.io/joelcrosby/netptune:latest"
  client:
    client_image: "ghcr.io/joelcrosby/netptune-client:latest"
    api_url: "http://api-service:7400"
secrets:
  grafana:
    admin_password: ""
  headlamp:
    github_client_id: ""
    github_client_secret: ""
    cookie_secret: ""
  pgadmin:
    admin_email: ""
    admin_password: ""
    github_client_id: ""
    github_client_secret: ""
    cookie_secret: ""
  postgres:
    postgres_password: ""
  cache:
    cache_password: ""
  jobs:
    cache_password: ""
    postgres_password: ""
    signing_key: ""
    sendgrid_api_key: ""
    s3_bucket_name: ""
    s3_region: ""
    s3_access_key_id: ""
    s3_secret_access_key: ""
  api:
    cache_password: ""
    postgres_password: ""
    signing_key: ""
    github_client_id: ""
    github_secret: ""
    sendgrid_api_key: ""
    s3_bucket_name: ""
    s3_region: ""
    s3_access_key_id: ""
    s3_secret_access_key: ""
config:
  postgres:
    POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
    POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    POSTGRES_USER: "postgres"
  jobs:
    OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
    ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
    CACHE_HOST: "cache-service"
    CACHE_PORT: "6379"
    POSTGRESDB_HOST: "postgres-service"
    POSTGRESDB_PORT: "5432"
    POSTGRESDB_USERNAME: "postgres"
    POSTGRESDB_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres-service:5432/netptune"
    POSTGRESDB_DATABASENAME: "netptune"
    ConnectionStrings__nats: "nats://nats-service:4222"
  api:
    OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
    ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
    ASPNETCORE_URLS: "http://0.0.0.0:7400"
    CACHE_HOST: "cache-service"
    CACHE_PORT: "6379"
    POSTGRESDB_HOST: "postgres-service"
    POSTGRESDB_PORT: "5432"
    POSTGRESDB_USERNAME: "postgres"
    POSTGRESDB_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres-service:5432/netptune"
    POSTGRESDB_DATABASENAME: "netptune"
    ConnectionStrings__nats: "nats://nats-service:4222"
