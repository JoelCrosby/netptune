ingress:
  enabled: true
  host: "netptune.co.uk"
  appHost: "app.netptune.co.uk"
  publicApiHost: "api.netptune.co.uk"
  tls:
    enabled: true
    email: ""

persistence:
  postgres:
    size: "40Gi"
  meilisearch:
    size: "40Gi"
  nats:
    size: "40Gi"

headlamp:
  enabled: true
  image: "ghcr.io/headlamp-k8s/headlamp:latest"
  host: "headlamp.netptune.co.uk"
  oauth2:
    allowed_email_domain: "live.co.uk"

oauth2Proxy:
  image: "quay.io/oauth2-proxy/oauth2-proxy:v7.15.3"

pgadmin:
  enabled: false
  image: "dpage/pgadmin4:latest"
  host: "pgadmin.netptune.co.uk"

dbgate:
  enabled: true
  image: "dbgate/dbgate:latest"
  host: "dbgate.netptune.co.uk"

aspire:
  enabled: true
  image: "mcr.microsoft.com/dotnet/aspire-dashboard:13.4.2"
  host: "aspire.netptune.co.uk"
  oauth2:
    allowed_email_domain: "live.co.uk"
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      memory: "1Gi"
  # Telemetry is held in memory only and is lost when the pod restarts.
  # These caps bound how much memory the dashboard can consume.
  telemetryLimits:
    maxLogCount: 10000
    maxTraceCount: 10000
    maxMetricsCount: 50000

website:
  enabled: true
  replicas: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      memory: "128Mi"
  image: "ghcr.io/joelcrosby/netptune-website:latest"
  host: "www.netptune.co.uk"

parameters:
  jobs:
    replicas: 1
    port_http: 8080
    jobs_image: "ghcr.io/joelcrosby/netptune-jobs:latest"
  activity:
    replicas: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 5
      lagThreshold: 100
    retention:
      enabled: true
      schedule: "0 3 * * *"
      resources:
        requests:
          cpu: "50m"
          memory: "128Mi"
        limits:
          memory: "512Mi"
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        memory: "512Mi"
    port_http: 8080
    activity_image: "ghcr.io/joelcrosby/netptune-activity:latest"
  api:
    replicas: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        memory: "512Mi"
    port_http: 7400
    api_image: "ghcr.io/joelcrosby/netptune:latest"
  publicApi:
    replicas: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        memory: "512Mi"
    port_http: 7600
    public_api_image: "ghcr.io/joelcrosby/netptune-public-api:latest"
  client:
    replicas: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        memory: "128Mi"
    client_image: "ghcr.io/joelcrosby/netptune-client:latest"
    api_url: "http://api-service:7400"
