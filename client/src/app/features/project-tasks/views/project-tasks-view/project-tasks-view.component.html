<app-page-container>
  <app-page-header title="Tasks"
    actionTitle="Create Task"
    (actionClick)="showAddModal()"
    [overflowActions]="secondaryActions"
     />

  @if (loading()) {
    <div class="flex flex-col h-full items-center justify-center">
      <app-spinner diameter="32px" />
    </div>
  } @else {
    <app-task-list />
  }
</app-page-container>
