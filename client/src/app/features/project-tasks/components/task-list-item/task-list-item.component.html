<div class="task-item" [class.flagged]="task().isFlagged">
  <button
    class="task-action"
    mat-icon-button
    aria-label="more"
    [matMenuTriggerData]="{ task: task() }"
    [matMenuTriggerFor]="menu"
    >
    <svg lucideEllipsisVertical class="drag h-4 w-4"></svg>
  </button>

  <mat-checkbox class="task-checkbox" color="primary"> </mat-checkbox>

  <div class="task-scope-id-col">
    <div class="task-scope-id">{{ task().systemId }}</div>
  </div>

  <div class="title" aria-hidden="false" role="button" tabindex="" (click)="titleClicked()">
    {{ task().name }}
  </div>

  @if (task().isFlagged) {
    <svg lucideFlag class="flag h-5 w-5 text-red-500"></svg>
  }

  @if (task().status === 1) {
    <svg lucideCheck class="h-5 w-5 text-green-500"></svg>
  }

  @for (assignee of task().assignees; track assignee.id) {
    <app-avatar
      size="24"
      class="task-card-user-chip"
      [name]="assignee.displayName"
      [imageUrl]="assignee.pictureUrl"
      >
    </app-avatar>
  }
</div>

<mat-menu #menu="matMenu">
  <ng-template matMenuContent let-task="task">
    <button mat-menu-item (click)="markCompleteClicked(task)">
      <svg lucideCheck class="h-4 w-4"></svg>
      <span>Mark Complete</span>
    </button>

    <button mat-menu-item (click)="moveToBacklogClicked(task)">
      <svg lucideArchiveRestore class="h-4 w-4"></svg>
      <span>Move to Backlog</span>
    </button>

    <button mat-menu-item (click)="deleteClicked(task)">
      <svg lucideTrash2 class="h-4 w-4"></svg>
      <span>Delete</span>
    </button>
  </ng-template>
</mat-menu>
