<a [routerLink]="[ '.', project().key ]">
  <app-card-list-item
    [title]="project().name"
    [description]="project().description"
    [actions]="actions()"
    (delete)="onDeleteClicked()"
  >
    <h5 class="mt-4 mb-[0.4rem]">Repository</h5>

    <a [href]="project().repositoryUrl" class="block whitespace-nowrap overflow-hidden text-ellipsis max-w-full underline py-[0.6rem]">
      {{ project().repositoryUrl }}
    </a>
  </app-card-list-item>
</a>
