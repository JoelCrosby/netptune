@if (project(); as project) {
  <div>
    <form (submit)="updateClicked($event)">
      <app-form-input [formField]="projectForm.name" label="Name" maxLength="1024">
      </app-form-input>
      <app-form-textarea
        [formField]="projectForm.description"
        label="Description"
        rows="6"
        >
      </app-form-textarea>
      <div class="border-b-2 border-border my-8"></div>
      <div class="flex items-center">
        <app-form-input
          [formField]="projectForm.key"
          label="Project ID"
          class="w-[120px]"
          maxLength="6"
          >
        </app-form-input>
        <div>
          <small class="block opacity-60 px-[1.4rem]">
            The Project ID is displayed as the first part of task's ID
          </small>
          <small class="block opacity-60 px-[1.4rem]"> max 6 characters. should be unique to workspace </small>
        </div>
      </div>
      <app-form-input
        [formField]="projectForm.repositoryUrl"
        label="Repository URL"
        maxLength="1024"
        >
      </app-form-input>
      <button
        class="block mt-3 ml-auto"
        mat-flat-button
        color="primary"
        [disabled]="projectForm().disabled()"
        >
        Save Changes
      </button>
    </form>
  </div>
}
