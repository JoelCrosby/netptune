<app-page-container [marginBottom]="true">
  <app-page-header title="Project"
    backLabel="Back to projects"
    [backLink]="['../../projects']"
     />

  @if (loading()) {
    <div class="flex flex-col h-full items-center justify-center">
      <app-spinner diameter="32px" />
    </div>
  } @else {
    <app-project-detail />
  }

</app-page-container>
