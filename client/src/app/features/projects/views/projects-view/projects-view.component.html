<app-page-container [marginBottom]="true">
  <app-page-header title="Projects"
    actionTitle="Create Project"
    (actionClick)="showAddModal()"
     />

  @if (loading()) {
    <div class="flex flex-col h-full items-center justify-center">
      <mat-spinner diameter="32" />
    </div>
  } @else {
    <app-project-list />
  }

</app-page-container>
