<app-page-container
  [showProgress]="loadingUpdate()"
  [centerPage]="true"
  [marginBottom]="true"
  >
  <app-page-header title="Profile"
    actionTitle="Logout"
    (actionClick)="onLogoutClicked()"
     />

  @if (loading()) {
    <div class="flex flex-col h-full items-center justify-center">
      <mat-spinner diameter="32" />
    </div>
  } @else {
    <app-update-profile />
    <div class="border-b-2 border-border my-8"></div>
    <app-change-password />
  }
</app-page-container>
