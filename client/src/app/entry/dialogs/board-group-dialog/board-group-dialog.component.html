<h1 mat-dialog-title>Add Group</h1>

<div app-dialog-content>
  <form (submit)="onSubmit($event)">
    <app-form-input [formField]="groupForm.group" label="Group Name" maxLength="128">
    </app-form-input>
  </form>
</div>

<div app-dialog-actions align="end">
  <app-button variant="outlined" app-dialog-close>Close</app-button>
  <app-button variant="filled" (click)="onSubmit($event)">Add Group</app-button>
</div>
