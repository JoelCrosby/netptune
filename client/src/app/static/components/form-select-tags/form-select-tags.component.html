<div class="nept-form-control">
  @if (label()) {
    <!-- eslint-disable @angular-eslint/template/label-has-associated-control -->
  <label class="form-control-label">{{ label() }}</label>
  }

  <div
    #dropreference
    class="form-control-input flex-wrap! cursor-text!"
    [class.invalid]="touched() && invalid()"
    [class.active]="value().length > 0 && pending()"
    (click)="onTriggerClick($event)"
  >
    <div class="flex flex-1 flex-wrap items-center gap-1 px-3 py-1 min-w-0">
      @for (option of selectedOptions(); track option.value()) {
      <span
        class="inline-flex items-center gap-2 bg-primary-selected rounded-sm px-1.5 py-0.5 font-medium whitespace-nowrap"
      >
        {{ option.viewValue }}
        <button
          type="button"
          class="bg-transparent! border-0! cursor-pointer p-0! text-inherit opacity-70 hover:opacity-100 text-sm leading-none"
          (click)="removeValue(option.value(), $event)"
          aria-label="Remove"
        >
          &times;
        </button>
      </span>
      }

      <input
        #searchInput
        class="flex-1 min-w-15 w-auto!"
        [placeholder]="selectedOptions().length === 0 ? placeholder() : ''"
        [disabled]="disabled()"
        (input)="onSearchInput($event)"
        (keydown)="onKeyDown($event)"
        (blur)="onBlur()"
        autocomplete="off"
      />
    </div>

    @if (icon()) {
      <svg [lucideIcon]="icon()!" class="mr-3" size="20" aria-hidden="true"></svg>
      }

    <svg lucideChevronDown size="20" aria-hidden="true" class="flex! mr-3 justify-center items-center"></svg>

    <app-form-select-dropdown [reference]="dropreference">
      <div class="form-select-dropdown menu-scale-in">
        <ng-content select="app-form-select-tags-option" />
      </div>
    </app-form-select-dropdown>
  </div>

  @if (hint()) {
  <small class="form-control-hint">{{ hint() }}</small>
  }
</div>
