@if (user()) {
  <div>
    <div class="flex flex-row items-center">
      <app-avatar
        size="24"
        class="task-card-user-chip"
        [name]="user().displayName"
        [imageUrl]="user().pictureUrl"
        >
      </app-avatar>
      <form class="flex-1 ml-3" (submit)="submit($event)">
        <app-form-input
          [formField]="commentForm.comment"
          placeholder="Add Comment"
          icon="chat_bubble_outline"
          >
        </app-form-input>
      </form>
    </div>
    <div class="flex flex-col">
      @for (comment of comments(); track comment.id) {
        <div class="mb-5 flex flex-row items-center group">
          <app-avatar
            size="24"
            class="task-card-user-chip"
            [name]="comment.userDisplayName"
            [imageUrl]="comment.userDisplayImage"
            >
          </app-avatar>
          <div class="flex-1 flex flex-col">
            <span class="font-medium mb-1 flex flex-row items-center">
              {{ comment.userDisplayName }}
              <small class="flex-1 ml-[0.6rem] opacity-60"> {{ comment.createdAt | fromNow }} </small>
              <div class="w-10 hidden group-hover:block">
                <button
                  class="leading-4 h-4"
                  mat-icon-button
                  aria-label="Comment Actions"
                  [matMenuTriggerFor]="commentMenu"
                  [matMenuTriggerData]="{comment: comment}"
                  >
                  <mat-icon>more_horiz</mat-icon>
                </button>
                <mat-menu #commentMenu="matMenu">
                  <ng-template matMenuContent let-comment="comment">
                    <button mat-menu-item (click)="deleteComment.emit(comment)">
                      <mat-icon>delete</mat-icon>
                      <span>Delete Comment</span>
                    </button>
                  </ng-template>
                </mat-menu>
              </div>
            </span>
            <span class="text-sm font-normal ml-3"> {{ comment.body }} </span>
          </div>
        </div>
      }
    </div>
  </div>
}
