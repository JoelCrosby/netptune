<div class="nept-form-control w-[inherit] mb-[1.4rem]">
  @if (label()) {
    <label [for]="name()" appFormLabel>
      {{ label() }}
    </label>
  }

  <app-form-control-field
    #dropreference
    class="netp-form-select-search w-full"
    [invalid]="touched() && invalid()"
    [active]="!!value() && pending()"
    (click)="onTriggerClick($event)">
    @if (prefix()) {
      <div appFormPrefix>{{ prefix() }}</div>
    }

    <input
      #input
      appFormInput
      role="combobox"
      [attr.aria-expanded]="isOpen()"
      [attr.aria-controls]="listboxId"
      [attr.aria-activedescendant]="activeOptionId()"
      [placeholder]="placeholder()"
      [id]="name()"
      [value]="inputValue()"
      [disabled]="disabled()"
      [readOnly]="isReadonly()"
      class="grow"
      [style.padding]="prefix() ? '0 .8rem 0 0' : '0 .8rem'"
      (click)="$event.stopPropagation(); showDropdown()"
      (input)="onSearchInput($event)"
      (keydown)="onKeyDown($event)"
      (blur)="touched.set(true)"
      autocomplete="off" />

    @if (icon()) {
      <svg
        class="mr-3"
        [lucideIcon]="icon()!"
        size="20"
        aria-hidden="true"></svg>
    }

    <svg
      lucideChevronDown
      size="32"
      aria-hidden="true"
      class="arrow text-foreground/70 mr-4"
    />

    <app-form-select-dropdown [reference]="dropreference.el">
      <div
        class="form-select-dropdown form-select-search-dropdown menu-scale-in"
        [id]="listboxId"
        role="listbox">
        @if (filteredOptions().length) {
          <cdk-virtual-scroll-viewport
            class="form-select-search-viewport custom-scroll"
            [style.height.px]="dropdownHeight()"
            [itemSize]="itemSize()"
            minBufferPx="256"
            maxBufferPx="512">
            <div
              *cdkVirtualFor="
                let option of filteredOptions();
                let index = index;
                trackBy: trackByOption
              "
              class="nept-form-select-option form-select-search-option"
              role="option"
              [id]="optionId(index)"
              [class.active]="isActive(index)"
              [class.selected]="isSelected(option)"
              [style.height.px]="itemSize()"
              [attr.aria-selected]="isSelected(option)"
              (mouseenter)="setActiveIndex(index)"
              (click)="selectOption(option, $event)">
              @if (optionTemplate) {
                <ng-container
                  *ngTemplateOutlet="
                    optionTemplate;
                    context: {
                      $implicit: option,
                      active: isActive(index),
                      selected: isSelected(option),
                    }
                  " />
              } @else {
                {{ labelWith()(option) }}
              }
            </div>
          </cdk-virtual-scroll-viewport>
        } @else {
          <div class="form-select-search-empty">
            {{ emptyMessage() }}
          </div>
        }
      </div>
    </app-form-select-dropdown>
  </app-form-control-field>

  @if (hint()) {
    <small appFormHint>{{ hint() }}</small>
  }
</div>
